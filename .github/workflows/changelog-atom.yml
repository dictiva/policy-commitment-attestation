name: Generate changelog.atom

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md
      - .github/scripts/generate-changelog-atom.py
      - .github/workflows/changelog-atom.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Atom feed from CHANGELOG.md
        run: python3 .github/scripts/generate-changelog-atom.py

      - name: Commit + push if changed
        run: |
          if git diff --quiet changelog.atom; then
            echo "No changes to changelog.atom"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add changelog.atom
            git commit -m "chore(feed): regenerate changelog.atom"
            git push
          fi
